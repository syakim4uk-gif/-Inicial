<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инициал</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <style>
        :root {
            --primary: #2196F3;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333;
            --gray: #888;
            /* Цвета типов сеток */
            --type-rm: #2196F3; /* Рамочная - синий */
            --type-vs: #4CAF50; /* Вставная - зеленый */
            --type-psl: #FFEB3B; /* Плиссе Slim - желтый */
            --type-psm: #FF9800; /* Плиссе Smart - оранжевый */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Навигация */
        .tabs { 
            display: flex; background: #fff; border-top: 1px solid #ddd;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-btn { 
            flex: 1; padding: 15px; border: none; background: none; 
            font-weight: bold; color: var(--gray); font-size: 14px;
        }
        .tab-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }

        /* Контент */
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Формы и кнопки */
        .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 4px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 16px; /* Предотвращает зум на iOS */
        }
        .hint { font-size: 11px; color: var(--gray); margin-top: 2px; }
        
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-delete { background: #ff5252; color: #fff; padding: 8px; width: auto; }
        .btn-edit { background: #ffa000; color: #fff; padding: 8px; width: auto; margin-right: 5px; }

        /* Список заказов и сеток */
        .order-item { border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .grid-item { border-left: 5px solid var(--gray); position: relative; }
        .grid-num { font-weight: bold; margin-right: 10px; }
        .grid-meta { font-size: 13px; color: var(--gray); margin-top: 5px; line-height: 1.4; }
        .grid-extra { font-size: 11px; color: #999; }

        /* Уведомления */
        #toast { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; 
            border-radius: 20px; display: none; z-index: 1000; 
        }

        /* Очередь отправки */
        #offline-alert {
            background: #ff9800; color: white; padding: 10px; text-align: center;
            font-size: 13px; display: none; cursor: pointer;
        }

        /* Блок Сетка при редактировании */
        .editing-mode { background: #fffde7 !important; border: 2px solid #fbc02d; }
    </style>
</head>
<body>

<div id="offline-alert" onclick="processQueue()">Есть неотправленные заказы. Нажмите, чтобы отправить.</div>

<div class="content">
    <div id="screen-orders" class="screen active">
        <h2>Заказы</h2>
        <div id="orders-list"></div>
        <button class="btn btn-primary" onclick="createNewOrder()">+ Новый заказ</button>
    </div>

    <div id="screen-order-detail" class="screen">
        <button class="btn" style="background: #eee; margin-bottom: 10px;" onclick="showScreen('screen-orders')">← Назад к списку</button>
        
        <div class="card" id="customer-block">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0">Заказчик</h3>
                <button onclick="toggleCustomerBlock()" id="toggle-cust-btn">🔼</button>
            </div>
            <div id="customer-inputs">
                <div class="input-group">
                    <label>Адрес</label>
                    <input type="text" id="cust-address" placeholder="Улица, дом, кв">
                </div>
                <div class="input-group">
                    <label>Имя</label>
                    <input type="text" id="cust-name">
                </div>
                <div class="input-group">
                    <label>Телефон</label>
                    <input type="tel" id="cust-phone" placeholder="+7-___-___-__-__">
                </div>
                <div class="input-group">
                    <label>Примечание</label>
                    <textarea id="cust-note" rows="2"></textarea>
                </div>
            </div>
        </div>

        <div class="card" id="grid-form-block">
            <h3 id="grid-form-title">Добавить сетку</h3>
            <div class="input-group">
                <label>Тип сетки</label>
                <select id="grid-type" onchange="renderGridFields()">
                    <option value="rm">Рамочная</option>
                    <option value="vs">Вставная</option>
                    <option value="psl">Плиссе Slim</option>
                    <option value="psm">Плиссе Smart</option>
                </select>
            </div>
            
            <div id="dynamic-fields"></div>

            <div id="form-actions">
                <button class="btn btn-primary" id="btn-add-grid" onclick="addGrid()">Добавить</button>
            </div>
        </div>

        <h3>Изделия в заказе</h3>
        <div id="order-grids-list" style="max-height: 400px; overflow-y: auto;"></div>

        <div class="card" style="margin-top:20px;">
            <label>E-mail для отправки</label>
            <input type="email" id="target-email" placeholder="example@mail.ru" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="shareOrder('email')" style="flex:1">E-mail</button>
                <button class="btn btn-primary" onclick="shareOrder('share')" style="flex:1">Поделиться</button>
            </div>
        </div>
        <button class="btn btn-delete" onclick="deleteCurrentOrder()" style="width:100%; margin-top:20px;">Удалить заказ целиком</button>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Профиль мастера</h2>
        <div class="card">
            <div class="input-group">
                <label>Ваше Имя</label>
                <input type="text" id="user-name">
            </div>
            <div class="input-group">
                <label>Ваш Телефон</label>
                <input type="tel" id="user-phone" placeholder="+7-___-___-__-__">
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Сохранить профиль</button>
        </div>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showScreen('screen-orders', this)">ЗАКАЗЫ</button>
    <button class="tab-btn" onclick="showScreen('screen-profile', this)">ПРОФИЛЬ</button>
</div>

<div id="toast"></div>

<script>
/* --- ЛОГИКА БД (IndexedDB) --- */
let db;
const request = indexedDB.open("InitialDB", 1);
request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("orders", { keyPath: "id", autoIncrement: true });
    db.createObjectStore("settings", { keyPath: "key" });
};
request.onsuccess = e => {
    db = e.target.result;
    loadProfile();
    renderOrdersList();
    checkQueue();
};

/* --- СОСТОЯНИЕ --- */
let currentOrderId = null;
let editingGridIndex = null;

/* --- НАВИГАЦИЯ --- */
function showScreen(screenId, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    if(btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
}

/* --- ПРОФИЛЬ --- */
function saveProfile() {
    const data = { 
        key: "user", 
        name: document.getElementById('user-name').value, 
        phone: document.getElementById('user-phone').value 
    };
    db.transaction("settings", "readwrite").objectStore("settings").put(data);
    vibrate(50);
    showToast("Профиль сохранен");
}

function loadProfile() {
    db.transaction("settings").objectStore("settings").get("user").onsuccess = e => {
        if(e.target.result) {
            document.getElementById('user-name').value = e.target.result.name;
            document.getElementById('user-phone').value = e.target.result.phone;
        }
    };
    // Загрузка email
    db.transaction("settings").objectStore("settings").get("last_email").onsuccess = e => {
        if(e.target.result) document.getElementById('target-email').value = e.target.result.value;
    };
}

/* --- ЗАКАЗЫ --- */
async function createNewOrder() {
    const newOrder = {
        customer: { address: "Новый объект", name: "", phone: "", note: "" },
        grids: [],
        sent: null
    };
    const tx = db.transaction("orders", "readwrite");
    const id = await new Promise(res => {
        const req = tx.objectStore("orders").add(newOrder);
        req.onsuccess = () => res(req.result);
    });
    openOrder(id);
}

function openOrder(id) {
    currentOrderId = id;
    db.transaction("orders").objectStore("orders").get(id).onsuccess = e => {
        const order = e.target.result;
        document.getElementById('cust-address').value = order.customer.address;
        document.getElementById('cust-name').value = order.customer.name;
        document.getElementById('cust-phone').value = order.customer.phone;
        document.getElementById('cust-note').value = order.customer.note;
        renderGridsList(order.grids);
        renderGridFields();
        showScreen('screen-order-detail');
        attachAutoSave();
    };
}

function renderOrdersList() {
    const list = document.getElementById('orders-list');
    list.innerHTML = "";
    db.transaction("orders").objectStore("orders").openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
            const order = cursor.value;
            const counts = { rm:0, vs:0, psl:0, psm:0 };
            order.grids.forEach(g => counts[g.type]++);
            
            const div = document.createElement('div');
            div.className = 'card order-item';
            div.onclick = () => openOrder(order.id);
            div.innerHTML = `
                <div>
                    <strong>${order.customer.address || 'Без адреса'}</strong><br>
                    <small>Рм:${counts.rm}, Вс:${counts.vs}, ПSl:${counts.psl}, ПSm:${counts.psm}</small><br>
                    ${order.sent ? `<small style="color:green">Отправлено: ${order.sent}</small>` : ''}
                </div>
                <span>→</span>
            `;
            list.appendChild(div);
            cursor.continue();
        }
    };
}

/* --- СЕТКИ --- */
const GRID_CONFIG = {
    rm: { name: "Рамочная", color: "var(--type-rm)", fields: [
        { id: "w", label: "Ширина", type: "number", hint: "световой проем" },
        { id: "h", label: "Высота", type: "number", hint: "световой проем" },
        { id: "pr", label: "Притвор", type: "number" },
        { id: "clr", label: "Цвет", type: "select", options: ["белый", "антрацит", "коричневый", "золотой дуб", "махагон", "сосна", "черно-коричневый", "на заказ"] },
        { id: "plt", label: "Полотно", type: "select", options: ["стандарт", "антиМошка", "антиКошка", "ультра вью", "антиПыль", "алюминиевая"] }
    ]},
    vs: { name: "Вставная", color: "var(--type-vs)", fields: [
        { id: "w", label: "Ширина", type: "number", hint: "световой проем" },
        { id: "h", label: "Высота", type: "number", hint: "световой проем" },
        { id: "clr", label: "Цвет", type: "select", options: ["белый", "антрацит", "коричневый", "на заказ"] },
        { id: "plt", label: "Полотно", type: "select", options: ["стандарт", "антиМошка", "антиКошка", "ультра вью", "антиПыль", "алюминиевая"] },
        { id: "note", label: "Примечание", type: "text" }
    ]},
    psl: { name: "Плиссе Slim", color: "var(--type-psl)", fields: [
        { id: "w", label: "Ширина", type: "number", hint: "размер изделия" },
        { id: "h", label: "Высота", type: "number", hint: "размер изделия" },
        { id: "dir", label: "Закрывание", type: "select", options: ["<--", "-->", "⬇", "⬆", "--> <--"], hint: "вид со стороны установки" },
        { id: "clr", label: "Цвет", type: "select", options: ["белый", "антрацит", "коричневый", "на заказ"] },
        { id: "plt", label: "Полотно", type: "select", options: ["стандарт", "антиМошка", "антиКошка"] },
        { id: "sb", label: "Сборка сетки", type: "select", options: ["собрать", "не собирать"], hint: "как будешь забирать?" },
        { id: "ov", label: "Отв. верт (шт)", type: "text", def: "без" },
        { id: "og", label: "Отв. гор (шт)", type: "text", def: "без" },
        { id: "note", label: "Примечание", type: "text" }
    ]},
    psm: { name: "Плиссе Smart", color: "var(--type-psm)", fields: [
        { id: "w", label: "Ширина", type: "number", hint: "размер изделия" },
        { id: "h", label: "Высота", type: "number", hint: "размер изделия" },
        { id: "dir", label: "Закрывание", type: "select", options: ["<--", "-->", "⬇", "⬆", "--> <--"] },
        { id: "por", label: "Порог", type: "select", options: ["без (рама по кругу)", "тонкий порог анодированный", "тонкий порог окрашенный"], hint: "Если окрашенный - введи цвет в примечание" },
        { id: "hnd", label: "Ручка", type: "select", options: ["без", "снаружи", "внутри", "снаружи + внутри"] },
        { id: "clr", label: "Цвет", type: "select", options: ["белый", "антрацит", "коричневый", "на заказ"] },
        { id: "plt", label: "Полотно", type: "select", options: ["стандарт", "антиМошка", "антиКошка"] },
        { id: "sb", label: "Сборка сетки", type: "select", options: ["собрать", "не собирать"] },
        { id: "ov", label: "Отв. верт (шт)", type: "text", def: "без" },
        { id: "og", label: "Отв. гор (шт)", type: "text", def: "без" },
        { id: "note", label: "Примечание", type: "text" }
    ]}
};

function renderGridFields() {
    const type = document.getElementById('grid-type').value;
    const container = document.getElementById('dynamic-fields');
    container.innerHTML = "";
    
    GRID_CONFIG[type].fields.forEach(f => {
        const div = document.createElement('div');
        div.className = 'input-group';
        let inputHtml = '';
        if(f.type === 'select') {
            inputHtml = `<select id="f-${f.id}">${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
        } else {
            inputHtml = `<input type="${f.type}" id="f-${f.id}" value="${f.def || ''}" ${f.type==='number'?'inputmode="decimal"':''}>`;
        }
        div.innerHTML = `<label>${f.label}</label>${inputHtml}${f.hint?`<div class="hint">${f.hint}</div>`:''}`;
        container.appendChild(div);
    });

    // Автофокус на первое поле (Ширина)
    const firstInput = container.querySelector('input');
    if(firstInput) firstInput.focus();

    // Переход по Enter
    const allInputs = container.querySelectorAll('input, select');
    allInputs.forEach((el, idx) => {
        el.onkeydown = e => {
            if(e.key === 'Enter') {
                e.preventDefault();
                if(allInputs[idx+1]) allInputs[idx+1].focus();
                else addGrid();
            }
        };
    });
}

async function addGrid() {
    const type = document.getElementById('grid-type').value;
    const gridData = { type: type };
    let isValid = true;

    GRID_CONFIG[type].fields.forEach(f => {
        const val = document.getElementById(`f-${f.id}`).value;
        if(!val && f.id !== 'note') isValid = false;
        gridData[f.id] = val;
    });

    if(!isValid) { alert("Заполните обязательные поля!"); return; }

    const order = await getOrder(currentOrderId);
    if(editingGridIndex !== null) {
        order.grids[editingGridIndex] = gridData;
        editingGridIndex = null;
        showToast("Сохранено");
        vibrate(50);
        resetGridForm();
    } else {
        order.grids.push(gridData);
        showToast("Добавлено");
        vibrate([50, 30, 50]);
    }

    await saveOrder(order);
    renderGridsList(order.grids);
    renderGridFields(); // Сброс полей
}

function renderGridsList(grids) {
    const list = document.getElementById('order-grids-list');
    list.innerHTML = "";
    grids.forEach((g, index) => {
        const config = GRID_CONFIG[g.type];
        const div = document.createElement('div');
        div.className = 'card grid-item';
        div.style.borderLeftColor = config.color;
        
        let details = [];
        config.fields.forEach(f => {
            if(!['note','sb','ov','og'].includes(f.id)) details.push(`${f.label}: ${g[f.id]}`);
        });

        div.innerHTML = `
            <div>
                <span class="grid-num">${String(index + 1).padStart(2, '0')}</span>
                <strong>${config.name}</strong>
                <div class="grid-meta">${details.join(', ')}</div>
                <div class="grid-extra">
                    ${g.note ? `Прим: ${g.note}<br>` : ''}
                    ${g.sb ? `Сборка: ${g.sb}. ` : ''}
                    ${g.ov ? `Отв: В-${g.ov}, Г-${g.og}` : ''}
                </div>
            </div>
            <div style="position:absolute; top:10px; right:10px;">
                <button class="btn-edit" onclick="editGrid(${index})">✏</button>
                <button class="btn-delete" onclick="deleteGrid(${index})">❌</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function editGrid(index) {
    editingGridIndex = index;
    db.transaction("orders").objectStore("orders").get(currentOrderId).onsuccess = e => {
        const g = e.target.result.grids[index];
        document.getElementById('grid-type').value = g.type;
        renderGridFields();
        GRID_CONFIG[g.type].fields.forEach(f => {
            document.getElementById(`f-${f.id}`).value = g[f.id];
        });
        document.getElementById('grid-form-block').classList.add('editing-mode');
        document.getElementById('grid-form-title').innerText = "Редактирование сетки";
        document.getElementById('btn-add-grid').innerText = "Сохранить изменения";
        
        // Кнопка отмены
        if(!document.getElementById('btn-cancel-edit')) {
            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'btn-cancel-edit';
            cancelBtn.className = 'btn';
            cancelBtn.style.marginTop = "5px";
            cancelBtn.innerText = "Отмена";
            cancelBtn.onclick = resetGridForm;
            document.getElementById('form-actions').appendChild(cancelBtn);
        }
        document.getElementById('grid-form-block').scrollIntoView({behavior:'smooth'});
    };
}

function resetGridForm() {
    editingGridIndex = null;
    document.getElementById('grid-form-block').classList.remove('editing-mode');
    document.getElementById('grid-form-title').innerText = "Добавить сетку";
    document.getElementById('btn-add-grid').innerText = "Добавить";
    if(document.getElementById('btn-cancel-edit')) document.getElementById('btn-cancel-edit').remove();
    renderGridFields();
}

async function deleteGrid(index) {
    if(!confirm("Удалить это изделие?")) return;
    const order = await getOrder(currentOrderId);
    order.grids.splice(index, 1);
    await saveOrder(order);
    renderGridsList(order.grids);
    showToast("Удалено");
    vibrate(100);
}

/* --- ВСПОМОГАТЕЛЬНЫЕ --- */
function getOrder(id) {
    return new Promise(res => {
        db.transaction("orders").objectStore("orders").get(id).onsuccess = e => res(e.target.result);
    });
}

function saveOrder(order) {
    return new Promise(res => {
        const tx = db.transaction("orders", "readwrite");
        tx.objectStore("orders").put(order).onsuccess = () => res();
    });
}

function attachAutoSave() {
    const fields = ['cust-address', 'cust-name', 'cust-phone', 'cust-note'];
    fields.forEach(id => {
        document.getElementById(id).oninput = async () => {
            const order = await getOrder(currentOrderId);
            order.customer.address = document.getElementById('cust-address').value;
            order.customer.name = document.getElementById('cust-name').value;
            order.customer.phone = document.getElementById('cust-phone').value;
            order.customer.note = document.getElementById('cust-note').value;
            saveOrder(order);
        };
    });
}

function showToast(text) {
    const t = document.getElementById('toast');
    t.innerText = text;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1500);
}

function vibrate(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

function toggleCustomerBlock() {
    const block = document.getElementById('customer-inputs');
    const btn = document.getElementById('toggle-cust-btn');
    if(block.style.display === 'none') {
        block.style.display = 'block';
        btn.innerText = '🔼';
    } else {
        block.style.display = 'none';
        btn.innerText = '🔽';
    }
}

async function deleteCurrentOrder() {
    if(!confirm("Удалить ВЕСЬ заказ без возможности восстановления?")) return;
    db.transaction("orders", "readwrite").objectStore("orders").delete(currentOrderId);
    vibrate(200);
    showScreen('screen-orders');
    renderOrdersList();
}

/* --- ШЕРИНГ И ОЧЕРЕДЬ --- */
async function shareOrder(method) {
    const order = await getOrder(currentOrderId);
    const user = await new Promise(res => {
        db.transaction("settings").objectStore("settings").get("user").onsuccess = e => res(e.target.result || {name:'Мастер', phone:''});
    });

    const email = document.getElementById('target-email').value;
    db.transaction("settings", "readwrite").objectStore("settings").put({key: "last_email", value: email});

    let text = `ЗАКАЗ: ${order.customer.address}\n`;
    text += `Клиент: ${order.customer.name} (${order.customer.phone})\n`;
    text += `Мастер: ${user.name} (${user.phone})\n`;
    text += `--------------------------\n`;
    
    order.grids.forEach((g, i) => {
        const config = GRID_CONFIG[g.type];
        text += `${i+1}. ${config.name.toUpperCase()}\n`;
        config.fields.forEach(f => {
            if(g[f.id]) text += `   ${f.label}: ${g[f.id]}\n`;
        });
        text += `--------------------------\n`;
    });

    if(!navigator.onLine) {
        addToQueue(currentOrderId);
        showToast("Нет сети. Сохранено в очередь.");
        return;
    }

    if(method === 'email') {
        const subject = encodeURIComponent(`Заказ: ${order.customer.address}`);
        window.location.href = `mailto:${email}?subject=${subject}&body=${encodeURIComponent(text)}`;
    } else {
        if (navigator.share) {
            navigator.share({ title: 'Заказ сеток', text: text });
        } else {
            navigator.clipboard.writeText(text);
            showToast("Скопировано в буфер");
        }
    }

    order.sent = new Date().toLocaleString();
    await saveOrder(order);
    renderOrdersList();
}

function addToQueue(id) {
    db.transaction("settings", "readwrite").objectStore("settings").get("queue").onsuccess = e => {
        let q = e.target.result ? e.target.result.list : [];
        if(!q.includes(id)) q.push(id);
        db.transaction("settings", "readwrite").objectStore("settings").put({key: "queue", list: q});
        checkQueue();
    };
}

function checkQueue() {
    db.transaction("settings").objectStore("settings").get("queue").onsuccess = e => {
        const q = e.target.result;
        if(q && q.list.length > 0 && navigator.onLine) {
            document.getElementById('offline-alert').style.display = 'block';
            document.getElementById('offline-alert').innerText = `Есть неотправленные заказы (${q.list.length}). Нажмите для отправки.`;
        } else {
            document.getElementById('offline-alert').style.display = 'none';
        }
    };
}

async function processQueue() {
    const qData = await new Promise(res => {
        db.transaction("settings").objectStore("settings").get("queue").onsuccess = e => res(e.target.result);
    });
    if(!qData) return;
    
    for(let id of qData.list) {
        currentOrderId = id;
        await shareOrder('share'); // Или другой метод
    }
    
    db.transaction("settings", "readwrite").objectStore("settings").put({key: "queue", list: []});
    checkQueue();
    showToast("Очередь отправлена");
}

window.addEventListener('online', checkQueue);
</script>
